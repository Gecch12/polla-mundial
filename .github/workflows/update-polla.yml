name: Update Polla from Gmail

on:
  workflow_dispatch:
  push:
    paths:
      - 'inbox/latest.xlsx'
      - 'inbox/email.json'
      - 'scripts/update_from_email.py'

permissions:
  contents: write

jobs:
  update-polla:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl python-dateutil

      - name: Update data.js from Gmail Excel
        run: python scripts/update_from_email.py

      - name: Commit updated site data
        run: |
          git config user.name "polla-automation"
          git config user.email "actions@github.com"
          git add assets/js/data.js inbox/processed_message_ids.txt inbox/email.json inbox/latest.xlsx inbox/history scripts/update_from_email.py
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto update polla data from Gmail"
            git push
          fi
