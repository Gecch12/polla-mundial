name: Update Polla from Gmail

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: polla-gmail-update
  cancel-in-progress: false

jobs:
  update-polla:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl python-dateutil

      - name: Validate inbox files
        run: |
          test -f inbox/latest.xlsx
          test -f inbox/email.json

      - name: Update data.js from Gmail Excel
        run: python scripts/update_from_email.py

      - name: Commit updated site data
        run: |
          git config user.name "polla-automation"
          git config user.email "actions@github.com"
          git add assets/js/data.js inbox/processed_message_ids.txt inbox/email.json inbox/latest.xlsx inbox/history || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto update polla data from Gmail"
            git push
          fi
